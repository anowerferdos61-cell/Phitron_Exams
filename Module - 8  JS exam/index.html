<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coktail Bar</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <header>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="search-container" style="display: flex; gap: 10px;">
          <input type="text" id="search-input" class="form-control search-input" placeholder="Search...">
          <button onclick="searchProduct()" class="btn btn-primary">Search</button>
        </div>
      </div>
    </div>
  </div>
</header>



  <div id="main-container" class="main-container">
    <div id="product-container" class="product-container">

    </div>
    <div id="cart-container" class="cart-container">
      <h3>Your Selected Drinks -> <span id="count"> 0 </span></h3>
      <hr>
      <div id="cart-main-container" class="cart-main-container">

      </div>
      <hr>
    </div>
  </div>



  <div id="product-modal" class="product-modal">
    <div id="modal-body" class="modal-body">

    </div>
  </div>




  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
